
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Algerian Forest Fire Prediction</title>
    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            text-align: center;
        }
        .container {
            width: 420px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 12px rgba(0,0,0,0.15);
        }
        input, select {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
        }
        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: darkgreen;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔥 Algerian Forest Fire Prediction</h2>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <input type="number" step="any" name="Temperature" placeholder="Temperature (°C)" required>
        <input type="number" step="any" name="RH" placeholder="Relative Humidity (%)" required>
        <input type="number" step="any" name="Ws" placeholder="Wind Speed (km/h)" required>
        <input type="number" step="any" name="Rain" placeholder="Rain (mm)" required>

        <input type="number" step="any" name="FFMC" placeholder="FFMC" required>
        <input type="number" step="any" name="DMC" placeholder="DMC" required>
        <input type="number" step="any" name="ISI" placeholder="ISI" required>

        <!-- Class Selection -->
        <select name="Classes" required>
            <option value="">Select Fire Class</option>
            <option value="0">Not Fire</option>
            <option value="1">Fire</option>
        </select>

        <!-- Region Selection -->
        <select name="Region" required>
            <option value="">Select Region</option>
            <option value="0">Bejaia Region</option>
            <option value="1">Sidi Bel-Abbes Region</option>
        </select>

        <br><br>
        <button type="submit">Predict FWI</button>
    </form>

    
    <h3>
        {% if results %}
            🔥 Predicted FWI: {{ results }}
        {% endif %}
    </h3>
